name: Release

# Publishes to npm when a GitHub Release is published. Publishing is deliberate
# and tied to a version tag, not fired on every push. Uses npm trusted publishing
# (OIDC): no NPM_TOKEN, no long-lived secrets. Provenance is generated by default
# under trusted publishing, so we do not pass --provenance.
on:
  release:
    types: [published]

jobs:
  publish:
    name: publish
    runs-on: ubuntu-latest
    # The environment name must match the npm trusted-publisher configuration.
    environment: npm-publish
    permissions:
      # id-token: write lets the runner mint the OIDC token npm exchanges for
      # short-lived publish credentials. contents: read is for checkout.
      id-token: write
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 20
          registry-url: "https://registry.npmjs.org"
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Re-run the same gates as CI: a release must never ship unvalidated code.
      - name: Typecheck
        run: pnpm run typecheck

      - name: Test
        run: pnpm run test

      - name: Build
        run: pnpm run build

      # Trusted publishing needs npm 11.5.1 or newer; the npm bundled with Node 20
      # is older and does not understand OIDC publishing, so upgrade explicitly.
      - name: Ensure npm supports trusted publishing
        run: |
          npm install -g npm@latest
          npm -v

      # No NODE_AUTH_TOKEN: under trusted publishing npm authenticates via OIDC.
      - name: Publish to npm
        run: npm publish --access public
