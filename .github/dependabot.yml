version: 2
# This package has zero runtime dependencies, so these updates only ever touch
# devDependencies (the npm ecosystem) and GitHub Actions versions.
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
      prefix-development: "chore(deps-dev)"
    groups:
      dev-minor-and-patch:
        update-types:
          - minor
          - patch

  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    commit-message:
      prefix: "chore(deps)"
    groups:
      actions-minor-and-patch:
        update-types:
          - minor
          - patch
